name: test suite
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.npmignore'
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-vectors:
    uses: ./.github/workflows/verify-vectors.yml

  build:
    uses: ./.github/workflows/build.yml

  unit-fast:
    needs: [build, verify-vectors]
    uses: ./.github/workflows/unit-fast.yml

  unit-montecarlo-cbc:
    needs: [build, verify-vectors]
    uses: ./.github/workflows/unit-montecarlo-cbc.yml

  unit-montecarlo-ebc:
    needs: [build, verify-vectors]
    uses: ./.github/workflows/unit-montecarlo-ebc.yml

  unit-nessie:
    needs: [build, verify-vectors]
    uses: ./.github/workflows/unit-nessie.yml

  unit-crypto:
    needs: [build, verify-vectors]
    uses: ./.github/workflows/unit-crypto.yml
