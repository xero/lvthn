name: publish wiki
on:
  # runs on changes to the docs folder in the main branch
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
  # or manually
  workflow_dispatch:
jobs:
  sync-docs:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: repo
      - name: checkout wiki
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.CICD_TOKEN }}
      - name: configure git
        run: |
          # get the last commit author name and email
          cd repo
          COMMIT_NAME="${{ github.event.head_commit.author.name }}"
          COMMIT_EMAIL="${{ github.event.head_commit.author.email }}"
          # default to actor name if head_commit info is not available (e.g. onDispatch)
          if [ -z "$COMMIT_NAME" ]; then
            COMMIT_NAME="${{ github.actor }}"
            COMMIT_EMAIL="${{ github.actor }}@users.noreply.github.com"
          fi
          git config --global user.name "$COMMIT_NAME"
          git config --global user.email "$COMMIT_EMAIL"
          cd ..
      - name: sync docs to wiki
        run: |
          # clear wiki
          find wiki -mindepth 1 -maxdepth 1 -not -name '.git' -not -name 'svg' -exec rm -rf {} \;
          # copy docs to wiki
          cp -r repo/docs/* wiki/
          cd wiki
          # rename index file
          mv README.md Home.md
          # update layout
          echo "## &copy; $(date +"%Y") : [the Leviathan Project](https://github.com/xero/lvthn)" > _Footer.md
          echo -e "## **LVTHN Wiki**\n\n<img src=\"https://github.com/xero/lvthn/raw/main/docs/logo.svg\" alt=\"Leviathan logo\" width=\"96\">\n\n### Symmetric Ciphers\n- [serpent.ts](./serpent) \n\n### Block Modes\n- [blockmode.ts](./blockmode)\n\n### Stream Ciphers\n- [chacha20.ts](./chacha20)\n\n### AEAD\n- [chacha20poly1305.ts](./chacha20poly1305)\n\n### Hash Functions\n- [sha256.ts](./sha256)\n- [sha512.ts](./sha512)\n- [sha3.ts](./sha3)\n\n### Padding \n- [padding.ts](./padding) (PKCS#7)\n\n### MAC\n- [hmac.ts](./hmac)\n\n### Key Derivation \n- [argon2id.ts](./argon2id) \n- [pbkdf2.ts](./pbkdf2)\n\n### Asymmetric / Key Exchange\n- [x25519.ts](./x25519) (Curve25519,Ed25519)\n\n### Utilities\n- [base.ts](./base) (conversions, xor, compare, clear)\n- [random.ts](./random) (Fortuna CSPRNG)\n\n### Testing\n- [Vector Corpus](./vector_corpus)\n- [Testing Suite](./test_suite)\n\n### Audit logs\n- [Serpent Audit](./serpent_audit)\n- [SHA256 Audit](./sha256_audit)\n\n### Supplemental\n- [Serpent Reference](./serpent_reference)\n- [SHA256 Reference](./sha256_reference)\n- [Branding](./branding)\n\n" > _Sidebar.md
          # fix internal markdown linx (remove .md extension)
          find . -name "*.md" -exec perl -pi -e 's/\]\((?!https?:\/\/)([^)]+)\.md([#][^)]+)?\)/](\1\2)/g' {} \;
          git add .
          if git diff --staged --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "docs(wiki): sync :recycle:"
          git push
